<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dip Projects — Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brown: #5c1a00;
      --orange: #e07020;
      --orange-light: #f5a04a;
      --orange-pale: #fff4eb;
      --brown-pale: #fdf0e8;
      --text: #1e0e00;
      --muted: #9a7060;
      --border: #f0d8c8;
      --white: #ffffff;
      --surface: #fffaf7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224,112,32,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(92,26,0,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo-img {
      height: 72px;
      width: auto;
      filter: drop-shadow(0 4px 12px rgba(224,112,32,0.2));
    }

    .company-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      color: var(--brown);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .company-name span {
      color: var(--orange);
    }

    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      animation: slideUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--orange));
      border-radius: 3px 0 0 3px;
      transform: scaleY(0);
      transition: transform 0.25s ease;
    }

    .card:hover {
      border-color: var(--card-accent, var(--orange));
      box-shadow: 0 4px 24px rgba(224,112,32,0.1);
      transform: translateX(4px);
    }

    .card:hover::before {
      transform: scaleY(1);
    }

    .card:nth-child(1) { animation-delay: 0.15s; --card-accent: var(--orange); }
    .card:nth-child(2) { animation-delay: 0.25s; --card-accent: var(--brown); }
    .card:nth-child(3) { animation-delay: 0.35s; --card-accent: #b85000; }

    .card-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-icon {
      margin-right:10px;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--orange-pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: background 0.25s, border-color 0.25s;
    }

    .card:hover .card-icon {
      background: color-mix(in srgb, var(--card-accent) 12%, white);
      border-color: color-mix(in srgb, var(--card-accent) 30%, transparent);
    }

    .card-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
      animation: pulse 2s infinite;
    }

    .card-arrow {
      font-size: 1.1rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--card-accent);
      transform: translate(2px, -2px);
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      animation: fadeDown 0.8s ease 0.5s both;
    }

    .footer span {
      color: var(--orange);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) translateX(0); }
      to   { opacity: 1; transform: translateY(0) translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
      50%       { box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }
    }
    .main-logo{
      width:64px;
      height:auto;
      object-fit:contain;
      display:block;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo-wrap">
        <img
        src="logo.png"
        alt="DIP Logo"
        class="main-logo"
      >
      </div>
      <div class="company-name">Dip <span>Projects</span></div>
      <div class="tagline">Select your portal to continue</div>
      <div class="divider"><div class="divider-dot"></div></div>
    </div>

    <div class="cards">

      <!-- Client -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbyj63raziBXf13m-X_eAeuoashOd--AzvNecNFZAXhWO5YIl9Yw3mSwdDxYyLDGMe8a/exec" target="_blank">
        <div class="card-left">
          <div class="card-icon">🏠</div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Client</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">↗</span>
        </div>
      </a>

      <!-- Office -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbxCIIYIFFng_m95MLK40RBbtC0XRHlDyLaTE1exgHRhwebLyd1v-fUaiB2g0kOrJfTl/exec" target="_blank">
        <div class="card-left">
          <div class="card-icon">🏢</div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Office</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">↗</span>
        </div>
      </a>

      <!-- Site Engineer -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbyj63raziBXf13m-X_eAeuoashOd--AzvNecNFZAXhWO5YIl9Yw3mSwdDxYyLDGMe8a/exec" target="_blank">
        <div class="card-left">
          <div class="card-icon">⚙️</div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Site Engineer</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">↗</span>
        </div>
      </a>

    </div>

    <div class="footer">
      <span>Dip Projects</span> &nbsp;·&nbsp; All rights reserved &nbsp;·&nbsp; 2026
    </div>

  </div>
</body>
</html>
