<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dip Projects — Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brown: #5c1a00;
      --orange: #e07020;
      --orange-light: #f5a04a;
      --orange-pale: #fff4eb;
      --brown-pale: #fdf0e8;
      --text: #1e0e00;
      --muted: #9a7060;
      --border: #f0d8c8;
      --white: #ffffff;
      --surface: #fffaf7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224,112,32,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(92,26,0,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo-img {
      height: 72px;
      width: auto;
      filter: drop-shadow(0 4px 12px rgba(224,112,32,0.2));
    }

    .company-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      color: var(--brown);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .company-name span {
      color: var(--orange);
    }

    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      animation: slideUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--orange));
      border-radius: 3px 0 0 3px;
      transform: scaleY(0);
      transition: transform 0.25s ease;
    }

    .card:hover {
      border-color: var(--card-accent, var(--orange));
      box-shadow: 0 4px 24px rgba(224,112,32,0.1);
      transform: translateX(4px);
    }

    .card:hover::before {
      transform: scaleY(1);
    }

    .card:nth-child(1) { animation-delay: 0.15s; --card-accent: var(--orange); }
    .card:nth-child(2) { animation-delay: 0.25s; --card-accent: var(--brown); }
    .card:nth-child(3) { animation-delay: 0.35s; --card-accent: #b85000; }

    .card-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-icon {
      margin-right: 10px;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--orange-pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.25s, border-color 0.25s;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--orange);
      fill: none;
      transition: stroke 0.25s;
    }

    .card:hover .card-icon {
      background: color-mix(in srgb, var(--card-accent) 12%, white);
      border-color: color-mix(in srgb, var(--card-accent) 30%, transparent);
    }

    .card:hover .card-icon svg {
      stroke: var(--card-accent);
    }

    .card-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
      animation: pulse 2s infinite;
    }

    .card-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .card-arrow svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      transition: stroke 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--card-accent);
      transform: translate(2px, -2px);
    }

    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      animation: fadeDown 0.8s ease 0.5s both;
    }

    .footer span {
      color: var(--orange);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) translateX(0); }
      to   { opacity: 1; transform: translateY(0) translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
      50%       { box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }
    }
    .main-logo{
      width:74px;
      height:auto;
      object-fit:contain;
      display:block;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo-wrap">
        <img src="logo.png" alt="DIP Logo" class="main-logo">
      </div>
      <div class="company-name">Dip <span>Projects</span></div>
      <div class="tagline">Select your portal to continue</div>
      <div class="divider"><div class="divider-dot"></div></div>
    </div>

    <div class="cards">

      <!-- Client -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbzj1gJhzE7jLH4Y80n4G7KuptmpF65n56k-XLp0CUEZssIyHfR4di71ZMC4kZweRxhi/exec" target="_blank">
        <div class="card-left">
          <div class="card-icon">
            <!-- House / Home icon -->
            <svg viewBox="0 0 24 24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-5h-6v5H4a1 1 0 0 1-1-1V10.5z"/>
            </svg>
          </div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Client</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </div>
      </a>

      <!-- Office -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbzy1Zhk4L04Y0LJM84VvPTI4tCn_IjBkMNYFwXB8JN-PZfueNjC731E-8Ohz0D109qz/exec  " target="_blank">
        <div class="card-left">
          <div class="card-icon">
            <!-- Building / Office icon -->
            <svg viewBox="0 0 24 24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="1"/>
              <path d="M3 9h18"/>
              <path d="M9 3v18"/>
              <rect x="13" y="13" width="3" height="4"/>
              <rect x="5" y="5" width="2" height="2"/>
              <rect x="5" y="11" width="2" height="2"/>
              <rect x="11" y="5" width="2" height="2"/>
              <rect x="11" y="11" width="2" height="2"/>
              <rect x="17" y="5" width="2" height="2"/>
              <rect x="17" y="11" width="2" height="2"/>
            </svg>
          </div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Office</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </div>
      </a>

      <!-- Site Engineer -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbyXIzlYWARiPR-_u1icTzO-ZlBSMJbUxrU5r5lWxg5Yjvn2lxt-dOXzAWdLBT5zcWY9nQ/exec" target="_blank">
        <div class="card-left">
          <div class="card-icon">
            <!-- Hard hat / Engineer icon -->
            <svg viewBox="0 0 24 24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 17h20v2a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-2z"/>
              <path d="M12 3a8 8 0 0 1 8 8v2H4v-2a8 8 0 0 1 8-8z"/>
              <line x1="12" y1="3" x2="12" y2="8"/>
              <line x1="4.93" y1="6.93" x2="8" y2="10"/>
              <line x1="19.07" y1="6.93" x2="16" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="card-label">Portal</div>
            <div class="card-title">Site Engineer</div>
          </div>
        </div>
        <div class="card-right">
          <div class="status-dot"></div>
          <span class="card-arrow">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </div>
      </a>

    </div>

    <div class="footer">
      <span>Dip Projects</span> &nbsp;·&nbsp; All rights reserved &nbsp;·&nbsp; 2026
    </div>

  </div>
</body>
</html>
